# fly.io deployment config
# Run: fly launch (first time), then fly deploy

app = "researchmind-api"
primary_region = "sin"          # Singapore — closest to you

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true     # scale to zero when idle (saves money)
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Set secrets via CLI (never commit real keys):
# fly secrets set OPENAI_API_KEY=sk-...
# fly secrets set COHERE_API_KEY=...
# fly secrets set QDRANT_URL=https://...
# fly secrets set QDRANT_API_KEY=...
# fly secrets set API_SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))")
